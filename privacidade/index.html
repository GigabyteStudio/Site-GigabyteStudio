<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Política de Privacidade da GigabyteStudio" />
  <title>Política de Privacidade - GigabyteStudio</title>
  <style>
    :root{
      --bg:#0b0f19;
      --card:#11182a;
      --text:#e7ecff;
      --muted:#aab4d6;
      --line:rgba(255,255,255,.10);
      --brand:#6d8dff;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.6;
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:40px 20px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:28px;
    }

    h1,h2{
      margin-top:0;
    }

    h1{
      color:white;
      margin-bottom:8px;
    }

    .muted{
      color:var(--muted);
      margin-bottom:24px;
    }

    h2{
      margin-top:28px;
      color:var(--brand);
      font-size:20px;
    }

    p, li{
      color:var(--text);
    }

    ul{
      padding-left:20px;
    }

    .footer{
      margin-top:24px;
      font-size:14px;
      color:var(--muted);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Política de Privacidade</h1>
      <p class="muted">GigabyteStudio</p>

      <p>
        COLE AQUI O TEXTO DA SUA POLÍTICA DE PRIVACIDADE.
      </p>

      <div class="footer">
        Última atualização: 13/03/2026
      </div>
    </section>
  </main>
</body>
</html>
